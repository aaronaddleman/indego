name: Deploy

on:
  pull_request:
    branches: [main]

jobs:
  # ── API: Test + Deploy to preview ──
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - run: docker compose run --rm test

  api-deploy:
    needs: api-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Write version.json
        run: |
          echo '{"commit":"'$(git rev-parse --short HEAD)'","deployedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > functions/version.json

      - name: Build Docker image
        run: docker compose build firebase

      - name: Deploy functions + Firestore rules
        run: |
          docker compose run --rm \
            -e FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }} \
            firebase deploy --only functions,firestore:rules --project indego-bc76b

  # ── Web: Lint + Build + Deploy preview channel ──
  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_GRAPHQL_URL: https://us-central1-indego-bc76b.cloudfunctions.net/graphql
          VITE_FIREBASE_AUTH_DOMAIN: indego-bc76b.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: indego-bc76b
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

  web-deploy:
    needs: [web-test, api-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - name: Build for production
        run: npm run build
        env:
          VITE_GRAPHQL_URL: https://us-central1-indego-bc76b.cloudfunctions.net/graphql
          VITE_FIREBASE_AUTH_DOMAIN: indego-bc76b.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: indego-bc76b
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: indego-bc76b
          entryPoint: web
          expires: 7d
