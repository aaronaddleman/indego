name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  # ── API: Test + Deploy ──
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-api-${{ hashFiles('api/Dockerfile', 'api/functions/requirements.txt') }}
          restore-keys: docker-api-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: api
          load: true
          tags: indago-api:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run tests
        run: |
          docker run --rm indago-api:test \
            firebase emulators:exec \
              "pytest functions/tests/ -v" \
              --project demo-indago

      # Prevent cache from growing unbounded
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  api-deploy:
    needs: api-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Write version.json
        run: |
          echo '{"commit":"'$(git rev-parse --short HEAD)'","deployedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > functions/version.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create venv and install Python dependencies
        run: |
          python3 -m venv functions/venv
          functions/venv/bin/pip install -r functions/requirements.txt

      - name: Deploy functions + Firestore rules
        run: firebase deploy --only functions,firestore:rules --project indego-bc76b

  # ── Web: Lint + Build + Deploy ──
  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_GRAPHQL_URL: https://us-central1-indego-bc76b.cloudfunctions.net/graphql
          VITE_FIREBASE_AUTH_DOMAIN: indego-bc76b.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: indego-bc76b
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

  web-deploy:
    needs: [web-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - name: Build for production
        run: npm run build
        env:
          VITE_GRAPHQL_URL: https://us-central1-indego-bc76b.cloudfunctions.net/graphql
          VITE_FIREBASE_AUTH_DOMAIN: indego-bc76b.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: indego-bc76b
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Deploy to Firebase Hosting (production)
        if: github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          projectId: indego-bc76b
          entryPoint: web
          channelId: live

      - name: Deploy to Firebase Hosting (preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          projectId: indego-bc76b
          entryPoint: web
          expires: 7d
