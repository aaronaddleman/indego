# ─── Scalars ───

scalar DateTime
scalar Date

# ─── Enums ───

enum FrequencyType {
  DAILY
  WEEKLY
  CUSTOM
}

# ─── Input Types ───

input FrequencyInput {
  type: FrequencyType!
  daysOfWeek: [String!]     # Required for WEEKLY/CUSTOM — days the habit is due
  daysPerWeek: Int          # Deprecated — use daysOfWeek instead
  specificDays: [String!]   # Deprecated — use daysOfWeek instead
}

input ReminderInput {
  enabled: Boolean!
  time: String        # "HH:MM" in UTC, required if enabled=true
}

input CreateHabitInput {
  name: String!
  frequency: FrequencyInput!
  reminder: ReminderInput
}

input UpdateHabitInput {
  name: String
  frequency: FrequencyInput
  reminder: ReminderInput
}

input DateRangeInput {
  startDate: Date!
  endDate: Date!
}

# ─── Types ───

type User {
  id: ID!
  displayName: String!
  email: String!
  createdAt: DateTime!
}

type Frequency {
  type: FrequencyType!
  daysOfWeek: [String!]     # Specific days for WEEKLY/CUSTOM
  dueDays: [String!]!       # Computed: which days of the week this habit is due
  daysPerWeek: Int          # Deprecated
  specificDays: [String!]   # Deprecated
}

type Reminder {
  enabled: Boolean!
  time: String          # "HH:MM" in UTC
}

type Completion {
  date: Date!
  completedAt: DateTime!
}

type Habit {
  id: ID!
  name: String!
  frequency: Frequency!
  reminder: Reminder!
  longestStreak: Int!
  completions: [Completion!]!     # Derived from completions map on habit document
  createdAt: DateTime!
  updatedAt: DateTime!
}

type HabitStats {
  habitId: ID!
  habitName: String!
  totalCompletions: Int!
  longestStreak: Int!
  completionRate: Float!        # 0.0 - 1.0
}

type Version {
  commit: String!
  deployedAt: String!
}

type AllowedEmail {
  email: String!
  isAdmin: Boolean!
}

type UserStats {
  totalHabits: Int!
  totalCompletions: Int!
  habitStats: [HabitStats!]!
}

# ─── Queries ───

type Query {
  """API version info (no auth required)"""
  version: Version!

  """Get the current authenticated user's profile"""
  me: User!

  """Get all habits for the authenticated user"""
  habits: [Habit!]!

  """Get a single habit by ID"""
  habit(id: ID!): Habit

  """Get stats for the authenticated user"""
  stats(dateRange: DateRangeInput!): UserStats!

  """List all allowed emails (admin only)"""
  allowedEmails: [AllowedEmail!]!
}

# ─── Mutations ───

type Mutation {
  """Create or update the user profile (called on first login)"""
  upsertUser(displayName: String!): User!

  """Create a new habit"""
  createHabit(input: CreateHabitInput!): Habit!

  """Update an existing habit"""
  updateHabit(id: ID!, input: UpdateHabitInput!): Habit!

  """Delete a habit (hard delete)"""
  deleteHabit(id: ID!): Boolean!

  """Log a completion for a habit on a given date (idempotent). Date is a map key on the habit document."""
  logCompletion(habitId: ID!, date: Date!): Habit!

  """Remove a completion for a habit on a given date (removes map key)"""
  undoCompletion(habitId: ID!, date: Date!): Habit!

  """Add an email to the allowlist (admin only)"""
  addAllowedEmail(email: String!): AllowedEmail!

  """Remove an email from the allowlist (admin only)"""
  removeAllowedEmail(email: String!): Boolean!

  """Set admin status for an email (admin only)"""
  setAdminStatus(email: String!, isAdmin: Boolean!): AllowedEmail!
}
