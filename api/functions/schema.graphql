# ─── Scalars ───

scalar DateTime
scalar Date

# ─── Enums ───

enum FrequencyType {
  DAILY
  WEEKLY
  CUSTOM
}

enum TaskPriority {
  P1
  P2
  P3
  P4
}

enum ApiKeyPermission {
  CAN_MANAGE_API_KEYS
}

enum SortPreference {
  MANUAL
  DUE_DATE
  PRIORITY
  CREATED_AT
}

# ─── Input Types ───

input FrequencyInput {
  type: FrequencyType!
  daysOfWeek: [String!]     # Required for WEEKLY/CUSTOM — days the habit is due
  daysPerWeek: Int          # Deprecated — use daysOfWeek instead
  specificDays: [String!]   # Deprecated — use daysOfWeek instead
}

input ReminderInput {
  enabled: Boolean!
  time: String        # "HH:MM" in UTC, required if enabled=true
}

input CreateHabitInput {
  name: String!
  frequency: FrequencyInput!
  reminder: ReminderInput
}

input UpdateHabitInput {
  name: String
  frequency: FrequencyInput
  reminder: ReminderInput
}

input CreateTaskInput {
  title: String!
  description: String
  listId: ID
  parentId: ID
  priority: TaskPriority
  dueDate: Date
}

input UpdateTaskInput {
  title: String
  description: String
  listId: ID
  parentId: ID
  priority: TaskPriority
  dueDate: Date
}

input CreateApiKeyInput {
  name: String!
  expiresAt: DateTime!
}

input DateRangeInput {
  startDate: Date!
  endDate: Date!
}

# ─── Types ───

type User {
  id: ID!
  displayName: String!
  email: String!
  createdAt: DateTime!
}

type Frequency {
  type: FrequencyType!
  daysOfWeek: [String!]     # Specific days for WEEKLY/CUSTOM
  dueDays: [String!]!       # Computed: which days of the week this habit is due
  daysPerWeek: Int          # Deprecated
  specificDays: [String!]   # Deprecated
}

type Reminder {
  enabled: Boolean!
  time: String          # "HH:MM" in UTC
}

type Completion {
  date: Date!
  completedAt: DateTime!
}

type Habit {
  id: ID!
  name: String!
  frequency: Frequency!
  reminder: Reminder!
  longestStreak: Int!
  completions: [Completion!]!     # Derived from completions map on habit document
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Task {
  id: ID!
  title: String!
  description: String
  listId: ID!
  parentId: ID
  priority: TaskPriority!
  dueDate: Date
  completed: Boolean!
  completedAt: DateTime
  sortOrder: Float!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type TaskList {
  id: ID!
  name: String!
  isInbox: Boolean!
  sortPreference: SortPreference!
  taskCount: Int!
  createdAt: DateTime!
}

type HabitStats {
  habitId: ID!
  habitName: String!
  totalCompletions: Int!
  longestStreak: Int!
  completionRate: Float!        # 0.0 - 1.0
}

type Version {
  commit: String!
  deployedAt: String!
}

type ApiKey {
  id: ID!
  name: String!
  keyPrefix: String!
  expiresAt: DateTime!
  revokedAt: DateTime
  createdAt: DateTime!
}

type CreateApiKeyPayload {
  apiKey: ApiKey!
  key: String!
}

type AllowedEmail {
  email: String!
  isAdmin: Boolean!
  canManageApiKeys: Boolean!
}

type UserStats {
  totalHabits: Int!
  totalCompletions: Int!
  habitStats: [HabitStats!]!
}

# ─── Queries ───

type Query {
  """API version info (no auth required)"""
  version: Version!

  """Get the current authenticated user's profile"""
  me: User!

  """Get all habits for the authenticated user"""
  habits: [Habit!]!

  """Get a single habit by ID"""
  habit(id: ID!): Habit

  """Get stats for the authenticated user"""
  stats(dateRange: DateRangeInput!): UserStats!

  """Get all tasks, optionally filtered by list and completion status"""
  tasks(listId: ID, completed: Boolean): [Task!]!

  """Get a single task by ID"""
  task(id: ID!): Task

  """Get all lists for the authenticated user"""
  taskLists: [TaskList!]!

  """List the caller's API keys (requires canManageApiKeys + Bearer auth)"""
  apiKeys: [ApiKey!]!

  """List all allowed emails (admin only)"""
  allowedEmails: [AllowedEmail!]!
}

# ─── Mutations ───

type Mutation {
  """Create or update the user profile (called on first login)"""
  upsertUser(displayName: String!): User!

  """Create a new habit"""
  createHabit(input: CreateHabitInput!): Habit!

  """Update an existing habit"""
  updateHabit(id: ID!, input: UpdateHabitInput!): Habit!

  """Delete a habit (hard delete)"""
  deleteHabit(id: ID!): Boolean!

  """Log a completion for a habit on a given date (idempotent). Date is a map key on the habit document."""
  logCompletion(habitId: ID!, date: Date!): Habit!

  """Remove a completion for a habit on a given date (removes map key)"""
  undoCompletion(habitId: ID!, date: Date!): Habit!

  """Create a new task"""
  createTask(input: CreateTaskInput!): Task!

  """Update an existing task"""
  updateTask(id: ID!, input: UpdateTaskInput!): Task!

  """Delete a task and all its subtasks"""
  deleteTask(id: ID!): Boolean!

  """Complete a task and all its subtasks. Returns all affected tasks."""
  completeTask(id: ID!): [Task!]!

  """Uncomplete a single task (does not affect subtasks)"""
  uncompleteTask(id: ID!): Task!

  """Reorder a task within its list"""
  reorderTask(id: ID!, sortOrder: Float!): Task!

  """Create a new list"""
  createTaskList(name: String!): TaskList!

  """Update a list's name or sort preference"""
  updateTaskList(id: ID!, name: String, sortPreference: SortPreference): TaskList!

  """Delete a list — orphaned tasks move to Inbox"""
  deleteTaskList(id: ID!): Boolean!

  """Create a new API key (requires Bearer auth + canManageApiKeys). Returns full key once."""
  createApiKey(input: CreateApiKeyInput!): CreateApiKeyPayload!

  """Revoke an API key by ID (requires Bearer auth + canManageApiKeys)"""
  revokeApiKey(id: ID!): ApiKey!

  """Set API key management permission for a user (admin only)"""
  setApiKeyPermission(email: String!, enabled: Boolean!): AllowedEmail!

  """Add an email to the allowlist (admin only)"""
  addAllowedEmail(email: String!): AllowedEmail!

  """Remove an email from the allowlist (admin only)"""
  removeAllowedEmail(email: String!): Boolean!

  """Set admin status for an email (admin only)"""
  setAdminStatus(email: String!, isAdmin: Boolean!): AllowedEmail!
}
