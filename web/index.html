<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#006c49" />
    <title>Indago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
      (function() {
        // One-time SW migration: clear old Workbox-generated SW and caches
        if (!localStorage.getItem('sw-migrated') && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            var hadOldSW = regs.length > 0;
            Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
              if ('caches' in window) {
                caches.keys().then(function(names) {
                  return Promise.all(names.map(function(n) { return caches.delete(n); }));
                }).then(function() {
                  localStorage.setItem('sw-migrated', '1');
                  if (hadOldSW) location.reload();
                });
              } else {
                localStorage.setItem('sw-migrated', '1');
                if (hadOldSW) location.reload();
              }
            });
          });
        }

        var t = localStorage.getItem('theme') || 'system';
        var resolved = t;
        if (t === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (resolved !== 'light') {
          document.documentElement.setAttribute('data-theme', resolved);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
